services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
    - GENERIC_TIMEZONE=Africa/Nairobi
    - TZ=Africa/Nairobi
    - N8N_SECURE_COOKIE=false
    - N8N_HOST=100.85.221.40
    - N8N_PORT=5678
    - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./workflows:/workflows